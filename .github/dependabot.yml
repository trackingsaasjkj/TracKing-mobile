version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Mexico_City"
    groups:
      tanstack:
        patterns:
          - "@tanstack/*"
      expo:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
      react-navigation:
        patterns:
          - "@react-navigation/*"
    # Ignorar actualizaciones major de expo y react-native — requieren migración planificada
    ignore:
      - dependency-name: "expo"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-native"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
